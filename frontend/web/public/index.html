<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xEpic Labs — Sign In</title>
    <meta name="description" content="Secure authentication portal for xEpic Labs platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/styles.css?v=2.0">
</head>
<body>
    <div class="glass-panel">

        <!-- Brand Header -->
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h1>xEpic Labs</h1>
            <p>Secure Infrastructure Platform</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button type="button" class="tab-btn active" id="tabLogin">Sign In</button>
            <button type="button" class="tab-btn" id="tabSignup">Create Account</button>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert"></div>

        <!-- Login Form -->
        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" name="username" required placeholder="e.g. noctis25" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe">Keep me signed in</label>
            </div>
            <button type="submit" class="btn" id="loginSubmitBtn">Sign In</button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden" autocomplete="on">
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" name="username" required minlength="3" maxlength="30" placeholder="e.g. noctis25" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" name="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" name="password" required placeholder="••••••••" autocomplete="new-password">
                <div class="strength-meter">
                    <div class="strength-bar" id="bar-1"></div>
                    <div class="strength-bar" id="bar-2"></div>
                    <div class="strength-bar" id="bar-3"></div>
                    <div class="strength-bar" id="bar-4"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
            <button type="submit" class="btn" id="signupSubmitBtn" disabled>Create Account</button>
        </form>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
