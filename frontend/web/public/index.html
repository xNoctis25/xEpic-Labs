<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xEpic Labs — Sign In</title>
    <meta name="description" content="Secure authentication portal for xEpic Labs platform.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/styles.css?v=15.0">
</head>
<body>
    <div class="glass-panel">

        <!-- Brand Header -->
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h1>xEpic Labs</h1>
            <p>Secure Infrastructure Platform</p>
        </div>

        <!-- Tabs -->
        <div class="auth-tabs">
            <button type="button" class="tab-btn active" id="tabLogin">Sign In</button>
            <button type="button" class="tab-btn" id="tabSignup">Create Account</button>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="alert"></div>

        <!-- ── Sign In Form ── -->
        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" name="username" required placeholder="Username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="loginPassword" name="password" required placeholder="Password" autocomplete="current-password">
                    <button type="button" class="eye-btn" id="toggleLoginPassword" aria-label="Toggle password visibility">
                        <svg class="eye-icon" id="eyeLoginOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-icon hidden" id="eyeLoginClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-footer">
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" checked>
                    <label for="rememberMe">Keep me signed in</label>
                </div>
                <a href="/forgot-password.html" class="forgot-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn" id="loginSubmitBtn">Sign In</button>
        </form>

        <!-- ── Create Account Form ── -->
        <form id="signupForm" class="hidden" autocomplete="on">
            <div class="form-group">
                <label for="signupUsername">Username</label>
                <input type="text" id="signupUsername" name="username" required minlength="3" maxlength="30" placeholder="Username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" name="email" required placeholder="Email Address" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="signupPassword">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signupPassword" name="password" required placeholder="Password" autocomplete="new-password">
                    <button type="button" class="eye-btn" id="toggleSignupPassword" aria-label="Toggle password visibility">
                        <svg class="eye-icon" id="eyeSignupOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-icon hidden" id="eyeSignupClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <div class="strength-meter">
                    <div class="strength-bar" id="bar-1"></div>
                    <div class="strength-bar" id="bar-2"></div>
                    <div class="strength-bar" id="bar-3"></div>
                    <div class="strength-bar" id="bar-4"></div>
                </div>
                <div class="strength-text" id="strengthText"></div>
            </div>
            <div class="form-group">
                <label for="signupConfirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="signupConfirmPassword" name="confirmPassword" required placeholder="Confirm Password" autocomplete="new-password">
                    <button type="button" class="eye-btn" id="toggleConfirmPassword" aria-label="Toggle password visibility">
                        <svg class="eye-icon" id="eyeConfirmOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-icon hidden" id="eyeConfirmClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <div class="match-text" id="matchText"></div>
            </div>
            <button type="submit" class="btn" id="signupSubmitBtn" disabled>Create Account</button>
        </form>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
