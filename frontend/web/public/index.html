<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Authentication</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="glass-panel">
        <div class="auth-tabs">
            <button type="button" class="tab-btn active" id="tabLogin">Log In</button>
            <button type="button" class="tab-btn" id="tabSignup">Sign Up</button>
        </div>
        
        <div id="alertBox" class="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMe" checked>
                <label for="rememberMe" style="margin:0; text-transform:none;">Remember me for 30 days</label>
            </div>
            <button type="submit" class="btn" id="loginSubmitBtn">Log In</button>
        </form>

        <form id="signupForm" class="hidden">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="signupUsername" required minlength="3" maxlength="30" placeholder="e.g. noctis25">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" required placeholder="••••••••">
                <div class="strength-meter">
                    <div class="strength-bar" id="bar-1"></div>
                    <div class="strength-bar" id="bar-2"></div>
                    <div class="strength-bar" id="bar-3"></div>
                    <div class="strength-bar" id="bar-4"></div>
                </div>
                <div class="strength-text" id="strengthText">Start typing...</div>
            </div>
            <button type="submit" class="btn" id="signupSubmitBtn" disabled>Create Account</button>
        </form>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
