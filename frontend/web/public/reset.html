<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xEpic Labs — Reset Password</title>
    <meta name="description" content="Reset your xEpic Labs account password.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/css/styles.css?v=8.0">
</head>
<body>
    <div class="glass-panel" style="max-width:420px;">

        <!-- Brand Header -->
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
            </div>
            <h1>xEpic Labs</h1>
            <p>Reset Your Password</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <p style="text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:24px; line-height:1.6;">
            If an account exists for that email, a 6-digit code has been sent.<br>
            <span style="font-size:0.78rem; opacity:0.7;">Check your spam folder if it doesn't arrive within a few minutes.</span>
        </p>

        <form id="resetForm" autocomplete="off">
            <div class="form-group">
                <label for="resetOtp">6-Digit Code</label>
                <input type="text" id="resetOtp" required maxlength="6" placeholder="123456"
                       inputmode="numeric" pattern="\d{6}"
                       style="letter-spacing:6px; text-align:center; font-size:1.3rem; font-weight:600;">
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" required placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="eye-btn" id="toggleNewPw" aria-label="Toggle password visibility">
                        <svg class="eye-icon" id="eyeNewOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-icon hidden" id="eyeNewClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirmNewPassword">Confirm New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmNewPassword" required placeholder="••••••••" autocomplete="new-password">
                    <button type="button" class="eye-btn" id="toggleConfirmPw" aria-label="Toggle password visibility">
                        <svg class="eye-icon" id="eyeConfirmNOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-icon hidden" id="eyeConfirmNClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <div class="match-text" id="resetMatchText"></div>
            </div>
            <button type="submit" class="btn" id="resetBtn">Change Password</button>
            <p class="text-center" style="margin-top:18px;">
                <a href="/" class="forgot-link">← Back to Sign In</a>
            </p>
        </form>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/reset.js"></script>
</body>
</html>
