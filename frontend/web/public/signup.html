<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="glass-panel">
        <h2>Create Account</h2>
        <p class="subtitle">Join the platform today</p>
        <div id="alertBox" class="alert"></div>
        <form id="signupForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required minlength="3" maxlength="30" placeholder="e.g. noctis25">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
                <div class="strength-meter">
                    <div class="strength-bar" id="bar-1"></div>
                    <div class="strength-bar" id="bar-2"></div>
                    <div class="strength-bar" id="bar-3"></div>
                    <div class="strength-bar" id="bar-4"></div>
                </div>
                <div class="strength-text" id="strengthText">Start typing...</div>
            </div>
            <button type="submit" class="btn" id="submitBtn" disabled>Sign Up</button>
        </form>
        <p class="text-center">Already have an account? <a href="/">Log In</a></p>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/signup.js"></script>
</body>
</html>
